name: Build Go Version

on:
  push:
    branches:
      - main
    paths:
      - 'go-version/**'
      - '.github/workflows/build-go-version.yml'

jobs:
  build-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: go-version/go.sum

      - name: Verify Go build
        run: |
          cd go-version
          go build -v ./cmd/pve-exporter/main.go

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: getversion
        run: |
          GIT_SHA=$(git rev-parse --short=12 HEAD)
          echo "IMAGE_TAG=${GIT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push Go image
        uses: docker/build-push-action@v5
        with:
          context: ./go-version
          file: ./go-version/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-go:latest
            ghcr.io/${{ github.repository }}-go:${{ steps.getversion.outputs.IMAGE_TAG }}
          provenance: false
